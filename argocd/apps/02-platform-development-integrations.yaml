apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-development-integrations
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dynamic-systems-io/system-development.git
    targetRevision: main
    path: integrations
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
