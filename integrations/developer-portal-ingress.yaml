apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: development-system-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - backstage.docker.internal
        - keycloak.docker.internal
        - backstage.127.0.0.1.nip.io
        - backstage.localhost
        - keycloak.127.0.0.1.nip.io
        - keycloak.localhost
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backstage-external
  namespace: istio-system
spec:
  hosts:
    - backstage.docker.internal
    - backstage.127.0.0.1.nip.io
    - backstage.localhost
  gateways:
    - development-system-gateway
  http:
    - route:
        - destination:
            host: development-system-backstage.development-system.svc.cluster.local
            port:
              number: 7007
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: keycloak-external
  namespace: istio-system
spec:
  hosts:
    - keycloak.docker.internal
    - keycloak.127.0.0.1.nip.io
    - keycloak.localhost
  gateways:
    - development-system-gateway
  http:
    - route:
        - destination:
            host: oidc-keycloak.development-system.svc.cluster.local
            port:
              number: 8080
