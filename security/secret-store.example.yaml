# Example namespace-scoped SecretStore for development-system.
#
# Copy to secret-store.yaml, fill provider details, then apply:
# kubectl apply -f security/secret-store.yaml
#
# NOTE: This is intentionally not included in kustomization resources.
# It is environment-specific and should be managed per cluster.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: secret-store
  namespace: development-system
spec:
  provider:
    # Choose ONE provider block below and remove the others.

    # Example: HashiCorp Vault
    vault:
      server: https://vault.example.com
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: development-system
          serviceAccountRef:
            name: default

    # Example: AWS Secrets Manager
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: default

    # Example: 1Password Connect
    # onepassword:
    #   connectHost: https://onepassword-connect.example.com
    #   vaults:
    #     platform: 1
    #   auth:
    #     secretRef:
    #       connectTokenSecretRef:
    #         name: op-connect-token
    #         key: token
